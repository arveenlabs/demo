spring.application.name=demo
server.port=5000

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/lms_app}

# JWT
jwt.secret=${JWT_SECRET:dev-secret-change-me-32chars-min-12345}

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:placeholder_secret}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:placeholder_webhook_secret}

# Push notifications
emergent.push.base-url=https://integrations.emergentagent.com
emergent.push.key=${EMERGENT_PUSH_KEY:placeholder}

# Jackson snake_case
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=NON_NULL

# Logging
logging.level.com.example.demo=INFO
